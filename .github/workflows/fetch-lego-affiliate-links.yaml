name: Fetch Lego Affiliate Links

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'
      timezone: "America/New_York"

permissions:
  contents: write

jobs:
  fetch_affiliate_links:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2
      with:
        token: ${{ secrets.GH_PAT }}

    - name: Set up Node.js
      uses: actions/setup-node@v1
      with:
        node-version: 24.13.x

    - name: Install dependencies
      run: npm install

    - name: Run script
      run: npm run loadLego
      env:
        RAKUTEN_CLIENT_ID: ${{ secrets.RAKUTEN_CLIENT_ID }}
        RAKUTEN_CLIENT_SECRET: ${{ secrets.RAKUTEN_CLIENT_SECRET }}
        RAKUTEN_SCOPE: ${{ secrets.RAKUTEN_SCOPE }}

    - name: Commit and Push Link Config Update
      env:
        GH_TOKEN: ${{ secrets.GH_PAT }}
      run: |
        git config user.name "bobby[bot]"
        git config user.email "bobby[bot]@users.noreply.github.com"
        git add .
        # Only commit and push if there are staged changes
        if ! git diff --cached --exit-code; then
          git commit -m "Lego Affiliate Links Update"
          git push
        else
          echo "No changes to commit"
        fi
